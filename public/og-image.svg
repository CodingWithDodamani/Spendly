<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1117" />
      <stop offset="50%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#0D1117" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#14B8A6" />
    </linearGradient>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#14B8A6" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="40" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)" />

  <!-- Decorative circles -->
  <circle cx="900" cy="100" r="200" fill="#10B981" opacity="0.05" />
  <circle cx="100" cy="500" r="250" fill="#14B8A6" opacity="0.05" />
  <circle cx="600" cy="580" r="180" fill="#10B981" opacity="0.04" />

  <!-- Grid lines -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="#10B981" stroke-width="0.5" opacity="0.08" />
  <line x1="600" y1="0" x2="600" y2="630" stroke="#10B981" stroke-width="0.5" opacity="0.08" />

  <!-- Accent line top -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accentGrad)" />

  <!-- Logo -->
  <rect x="500" y="80" width="200" height="200" rx="48" fill="url(#logoGrad)" filter="url(#glow)" />
  <circle cx="600" cy="180" r="55" fill="white" fill-opacity="0.95" />
  <path d="M574 180 L592 198 L628 162" fill="none" stroke="#10B981" stroke-width="11" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Title -->
  <text x="600" y="360" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="72" font-weight="800" fill="white" letter-spacing="-1">Spendly</text>

  <!-- Subtitle -->
  <text x="600" y="410" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="28" fill="#94A3B8" font-weight="500">Track Daily, Spend Happily</text>

  <!-- Feature tags -->
  <rect x="310" y="450" width="180" height="40" rx="20" fill="#10B981" fill-opacity="0.15" />
  <text x="400" y="476" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#10B981" font-weight="600">Privacy First</text>

  <rect x="510" y="450" width="180" height="40" rx="20" fill="#14B8A6" fill-opacity="0.15" />
  <text x="600" y="476" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#14B8A6" font-weight="600">100% Free</text>

  <rect x="710" y="450" width="180" height="40" rx="20" fill="#10B981" fill-opacity="0.15" />
  <text x="800" y="476" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#10B981" font-weight="600">Made for India</text>

  <!-- Bottom bar -->
  <rect x="0" y="560" width="1200" height="70" fill="#0A0F1A" fill-opacity="0.6" />
  <text x="600" y="600" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="18" fill="#64748B" font-weight="500">React 19 · Vite 7 · Tailwind CSS 4 · TypeScript · Recharts</text>

  <!-- Bottom accent line -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accentGrad)" />
</svg>

<svg viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1117" />
      <stop offset="50%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#0D1117" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#14B8A6" />
    </linearGradient>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#14B8A6" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="35" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bgGrad)" />

  <!-- Decorative circles -->
  <circle cx="1000" cy="120" r="220" fill="#10B981" opacity="0.05" />
  <circle cx="150" cy="520" r="280" fill="#14B8A6" opacity="0.05" />

  <!-- Accent top -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#accentGrad)" />

  <!-- Logo -->
  <rect x="540" y="60" width="200" height="200" rx="48" fill="url(#logoGrad)" filter="url(#glow)" />
  <circle cx="640" cy="160" r="55" fill="white" fill-opacity="0.95" />
  <path d="M614 160 L632 178 L668 142" fill="none" stroke="#10B981" stroke-width="11" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Title -->
  <text x="640" y="340" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="72" font-weight="800" fill="white" letter-spacing="-1">Spendly</text>

  <!-- Subtitle -->
  <text x="640" y="390" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="26" fill="#94A3B8" font-weight="500">Track Daily, Spend Happily</text>

  <!-- Feature cards -->
  <rect x="220" y="430" width="220" height="60" rx="12" fill="#1E293B" stroke="#334155" stroke-width="1" />
  <text x="330" y="467" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="16" fill="#10B981" font-weight="600">🔒 Privacy First</text>

  <rect x="470" y="430" width="220" height="60" rx="12" fill="#1E293B" stroke="#334155" stroke-width="1" />
  <text x="580" y="467" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="16" fill="#14B8A6" font-weight="600">📊 Rich Analytics</text>

  <rect x="720" y="430" width="220" height="60" rx="12" fill="#1E293B" stroke="#334155" stroke-width="1" />
  <text x="830" y="467" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="16" fill="#10B981" font-weight="600">🎯 Budget Planner</text>

  <!-- Bottom bar -->
  <rect x="0" y="560" width="1280" height="80" fill="#0A0F1A" fill-opacity="0.6" />
  <text x="640" y="600" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="18" fill="#64748B" font-weight="500">React 19 · Vite 7 · Tailwind CSS 4 · TypeScript</text>

  <!-- Bottom accent -->
  <rect x="0" y="636" width="1280" height="4" fill="url(#accentGrad)" />
</svg>
